<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>StageVerify favicon preview</title>
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <style>
      body {
        font-family: system-ui, sans-serif;
        margin: 2rem;
        color: #0b1f3a;
        background: #f4f6f8;
      }
      h1 {
        font-size: 1.25rem;
        margin-bottom: 0.25rem;
      }
      p {
        color: #5a6578;
        max-width: 42rem;
      }
      .grid {
        display: flex;
        flex-wrap: wrap;
        gap: 1.5rem;
        margin-top: 1.5rem;
      }
      .cell {
        background: #fff;
        border: 1px solid #e2e8f0;
        border-radius: 12px;
        padding: 1rem 1.25rem 1.25rem;
        min-width: 120px;
      }
      .cell h2 {
        font-size: 0.875rem;
        margin: 0 0 0.75rem;
        color: #5a6578;
      }
      .icon-wrap {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 72px;
        background:
          linear-gradient(45deg, #e2e8f0 25%, transparent 25%),
          linear-gradient(-45deg, #e2e8f0 25%, transparent 25%),
          linear-gradient(45deg, transparent 75%, #e2e8f0 75%),
          linear-gradient(-45deg, transparent 75%, #e2e8f0 75%);
        background-size: 16px 16px;
        background-position:
          0 0,
          0 8px,
          8px -8px,
          -8px 0;
        border-radius: 8px;
      }
      .tab-demo {
        margin-top: 2rem;
        padding: 1rem 1.25rem;
        background: #fff;
        border: 1px solid #e2e8f0;
        border-radius: 12px;
        max-width: 28rem;
      }
      .tab {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.45rem 0.9rem;
        border-radius: 8px 8px 0 0;
        background: #fff;
        border: 1px solid #d7dee8;
        border-bottom: none;
        font-size: 0.8125rem;
      }
      .tab img {
        width: 16px;
        height: 16px;
        image-rendering: pixelated;
      }
      .sheet {
        margin-top: 2rem;
        max-width: 100%;
      }
      .sheet img {
        max-width: 100%;
        border: 1px solid #e2e8f0;
        border-radius: 12px;
        background: #fff;
      }
    </style>
  </head>
  <body>
    <h1>StageVerify favicon preview</h1>
    <p>
      Compare the SV mark at real favicon sizes. Chosen variant: transparent canvas,
      contained mark, medium padding (~12% inset).
    </p>

    <div class="grid">
      <div class="cell">
        <h2>16 × 16</h2>
        <div class="icon-wrap"><img src="./favicon-16x16.png" width="16" height="16" alt="" /></div>
      </div>
      <div class="cell">
        <h2>24 × 24</h2>
        <div class="icon-wrap"><img src="./favicon-32x32.png" width="24" height="24" alt="" /></div>
      </div>
      <div class="cell">
        <h2>32 × 32</h2>
        <div class="icon-wrap"><img src="./favicon-32x32.png" width="32" height="32" alt="" /></div>
      </div>
      <div class="cell">
        <h2>48 × 48</h2>
        <div class="icon-wrap"><img src="./favicon-32x32.png" width="48" height="48" alt="" /></div>
      </div>
      <div class="cell">
        <h2>64 × 64</h2>
        <div class="icon-wrap"><img src="./favicon-32x32.png" width="64" height="64" alt="" /></div>
      </div>
    </div>

    <div class="tab-demo">
      <p style="margin-top: 0"><strong>Tab-size mockup</strong> (16px icon + label)</p>
      <div class="tab">
        <img src="./favicon-16x16.png" width="16" height="16" alt="" />
        StageVerify
      </div>
    </div>

    <div class="sheet">
      <p><strong>Variant contact sheet</strong></p>
      <img src="./favicon-preview.png" alt="Favicon variants at multiple sizes" />
    </div>
  </body>
</html>
